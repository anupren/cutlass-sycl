name: Sync from Upstream

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/upstream_sync.yml
  workflow_dispatch:
    inputs:
      provider:
        description: Claude provider to use
        required: false
        default: bedrock
        type: choice
        options:
          - bedrock
          - anthropic
      upstream_branch:
        description: Upstream branch to sync from
        required: false
        default: main
        type: string
      base_branch:
        description: Local base branch to open the PR against
        required: false
        default: main
        type: string
      claude_model:
        description: Claude model to use for conflict resolution
        required: false
        default: claude-opus-4-6
        type: string
      max_turns:
        description: Maximum Claude turns for this sync run
        required: false
        default: "20"
        type: string
      aws_region:
        description: AWS region for Bedrock runs
        required: false
        default: us-east-2
        type: string
      create_pr:
        description: Create or update a PR after the sync branch is pushed
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: upstream-sync-${{ inputs.base_branch || 'main' }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      SYNC_PROVIDER: ${{ inputs.provider || 'bedrock' }}
      SYNC_UPSTREAM_BRANCH: ${{ inputs.upstream_branch || 'main' }}
      SYNC_BASE_BRANCH: ${{ inputs.base_branch || github.base_ref || 'main' }}
      SYNC_CLAUDE_MODEL: ${{ inputs.claude_model || 'claude-opus-4-6' }}
      SYNC_MAX_TURNS: ${{ inputs.max_turns || '20' }}
      SYNC_AWS_REGION: ${{ inputs.aws_region || 'us-east-2' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Validate provider configuration
        shell: bash
        run: |
          if [ "${SYNC_PROVIDER}" = "bedrock" ]; then
            if [ -z "${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}" ]; then
              echo "::error::AWS_BEARER_TOKEN_BEDROCK secret is required for Bedrock upstream sync"
              exit 1
            fi
          elif [ "${SYNC_PROVIDER}" = "anthropic" ]; then
            if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
              echo "::error::ANTHROPIC_API_KEY secret is required when provider=anthropic"
              exit 1
            fi
          else
            echo "::error::Unsupported provider '${SYNC_PROVIDER}'"
            exit 1
          fi

      - name: Configure Git
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and prepare sync branch
        shell: bash
        run: |
          set -euo pipefail

          git remote add upstream https://github.com/NVIDIA/cutlass.git 2>/dev/null || \
            git remote set-url upstream https://github.com/NVIDIA/cutlass.git
          git fetch upstream "${SYNC_UPSTREAM_BRANCH}"
          git fetch origin "${SYNC_BASE_BRANCH}"

          UPSTREAM_COMMIT=$(git rev-parse "upstream/${SYNC_UPSTREAM_BRANCH}")
          UPSTREAM_SHORT=$(git rev-parse --short "${UPSTREAM_COMMIT}")
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          BRANCH_NAME="sync/upstream-${SYNC_UPSTREAM_BRANCH}-${UPSTREAM_SHORT}-${TIMESTAMP}"

          echo "UPSTREAM_COMMIT=${UPSTREAM_COMMIT}" >> "$GITHUB_ENV"
          echo "UPSTREAM_SHORT=${UPSTREAM_SHORT}" >> "$GITHUB_ENV"
          echo "BRANCH_NAME=${BRANCH_NAME}" >> "$GITHUB_ENV"

          git checkout -B "${SYNC_BASE_BRANCH}" "origin/${SYNC_BASE_BRANCH}"
          git checkout -b "${BRANCH_NAME}"

          set +e
          git merge --no-commit --no-ff "upstream/${SYNC_UPSTREAM_BRANCH}"
          MERGE_EXIT=$?
          set -e

          if [ "$MERGE_EXIT" -eq 0 ]; then
            echo "MERGE_STATE=clean" >> "$GITHUB_ENV"
          else
            echo "MERGE_STATE=conflict" >> "$GITHUB_ENV"
          fi

          git diff --name-only --diff-filter=U > conflicted_files.txt || true

      - name: Resolve Claude model id
        shell: bash
        run: |
          set -euo pipefail

          RESOLVED_MODEL="${SYNC_CLAUDE_MODEL}"
          FALLBACK_MODEL=""

          if [ -z "${RESOLVED_MODEL}" ]; then
            if [ "${SYNC_PROVIDER}" = "anthropic" ]; then
              RESOLVED_MODEL="claude-opus-4-6"
            else
              RESOLVED_MODEL="us.anthropic.claude-3-7-sonnet-20250219-v1:0"
            fi
          fi

          # Normalize model ids to provider-compatible formats and set a fallback model.
          if [ "${SYNC_PROVIDER}" = "bedrock" ]; then
            if [ "${RESOLVED_MODEL}" = "claude-opus-4-6" ]; then
              RESOLVED_MODEL="us.anthropic.claude-3-7-sonnet-20250219-v1:0"
              echo "::notice::claude-opus-4-6 is not a Bedrock model id. Falling back to '${RESOLVED_MODEL}' for Bedrock."
            fi

            # Bedrock requires an inference profile id (regional prefix) or a profile ARN.
            if [[ "${RESOLVED_MODEL}" == arn:aws:bedrock:* ]]; then
              echo "::notice::Using Bedrock inference profile ARN for model selection."
            elif [[ "${RESOLVED_MODEL}" == anthropic.* ]]; then
              RESOLVED_MODEL="us.${RESOLVED_MODEL}"
              echo "::notice::Converted Bedrock model to inference profile id '${RESOLVED_MODEL}'."
            elif [[ "${RESOLVED_MODEL}" != us.* && "${RESOLVED_MODEL}" != eu.* && "${RESOLVED_MODEL}" != apac.* ]]; then
              RESOLVED_MODEL="us.anthropic.${RESOLVED_MODEL}"
              echo "::notice::Normalized Bedrock model id to '${RESOLVED_MODEL}'. Override claude_model input if needed."
            fi

            FALLBACK_MODEL="us.anthropic.claude-3-5-sonnet-20241022-v2:0"
          else
            FALLBACK_MODEL="claude-sonnet-4-5"
          fi

          echo "SYNC_CLAUDE_MODEL_RESOLVED=${RESOLVED_MODEL}" >> "$GITHUB_ENV"
          echo "SYNC_CLAUDE_FALLBACK_MODEL=${FALLBACK_MODEL}" >> "$GITHUB_ENV"
          echo "Resolved model: ${RESOLVED_MODEL}"
          echo "Fallback model: ${FALLBACK_MODEL}"

      - name: Run Claude Code upstream sync resolution
        uses: anthropics/claude-code-action@d77b50d2b0808657f8e6774085c8bf54484351c
        env:
          CLAUDE_CODE_USE_BEDROCK: ${{ (inputs.provider || 'bedrock') == 'bedrock' && '1' || '0' }}
          CLAUDE_CODE_DISABLE_EXPERIMENTAL_BETAS: '1'
          AWS_REGION: ${{ (inputs.provider || 'bedrock') == 'bedrock' && (inputs.aws_region || 'us-east-2') || '' }}
          AWS_BEARER_TOKEN_BEDROCK: ${{ (inputs.provider || 'bedrock') == 'bedrock' && secrets.AWS_BEARER_TOKEN_BEDROCK || '' }}
        with:
          anthropic_api_key: ${{ (inputs.provider || 'bedrock') == 'anthropic' && secrets.ANTHROPIC_API_KEY || '' }}
          github_token: ${{ github.token }}
          use_bedrock: ${{ (inputs.provider || 'bedrock') == 'bedrock' && 'true' || 'false' }}
          fallback_model: ${{ env.SYNC_CLAUDE_FALLBACK_MODEL }}
          prompt: |
            You are resolving an upstream sync from NVIDIA/cutlass into this Intel SYCL fork.

            Repository context:
            - Upstream repository: NVIDIA/cutlass
            - Upstream branch: ${{ env.SYNC_UPSTREAM_BRANCH }}
            - Upstream commit: ${{ env.UPSTREAM_COMMIT }}
            - Local base branch: ${{ env.SYNC_BASE_BRANCH }}
            - Current merge state: ${{ env.MERGE_STATE }}

            The repository is already on a dedicated sync branch with an in-progress merge of upstream/${{ env.SYNC_UPSTREAM_BRANCH }}.

            Your task:
            - Resolve the upstream sync end-to-end in the current working tree.
            - Preserve all Intel, Xe, SYCL, oneAPI, DPCPP, Level Zero, PVC, and BMG related changes.
            - Preserve Intel-specific CI/workflow logic and Intel copyright headers.
            - Bring over upstream CUTLASS changes that are compatible with this fork.
            - Discard or revert NVIDIA-only and CUDA-only changes when they conflict with this fork's Intel/Xe direction.
            - When upstream introduces clearly NVIDIA-specific files or workflows that do not belong in this fork, remove them from the sync result rather than forcing them through.
            - Do not overwrite Intel/Xe adaptations with upstream NVIDIA assumptions.
            - Keep the result conservative and focused on upstream sync only.

            Priority areas to preserve:
            - include/cutlass/** Intel/Xe/SYCL specializations
            - include/cute/** where this fork has Intel/Xe changes
            - python/cutlass_library/** Intel architecture and generator logic
            - examples/** Intel Xe and SYCL examples
            - test/** Intel SYCL tests
            - .github/workflows/** Intel CI and maintenance workflows

            Before finishing:
            - Ensure there are no unmerged files.
            - Leave the repository in a clean, fully resolved git state.
            - Stage the final result with git add -A.
            - Do not create the PR yourself.
          claude_args: |
            --model ${{ env.SYNC_CLAUDE_MODEL_RESOLVED }}
            --max-turns ${{ env.SYNC_MAX_TURNS }}

      - name: Finalize sync commit
        id: finalize
        shell: bash
        run: |
          set -euo pipefail

          if [ -n "$(git diff --name-only --diff-filter=U)" ]; then
            echo "::error::Claude sync left unresolved merge conflicts"
            git diff --name-only --diff-filter=U
            exit 1
          fi

          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            if git rev-parse -q --verify MERGE_HEAD >/dev/null; then
              git commit \
                -m "sync: merge NVIDIA/cutlass ${{ env.UPSTREAM_SHORT }}" \
                -m "Automated upstream sync prepared with Claude Code while preserving Intel/Xe/SYCL-specific changes and dropping incompatible NVIDIA-only updates."
            else
              git commit \
                -m "sync: align with NVIDIA/cutlass ${{ env.UPSTREAM_SHORT }}" \
                -m "Automated upstream sync prepared with Claude Code while preserving Intel/Xe/SYCL-specific changes and dropping incompatible NVIDIA-only updates."
            fi
          fi

          AHEAD_COUNT=$(git rev-list --count "origin/${SYNC_BASE_BRANCH}..HEAD")
          echo "AHEAD_COUNT=${AHEAD_COUNT}" >> "$GITHUB_ENV"

          if [ "$AHEAD_COUNT" -eq 0 ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push sync branch
        if: github.event_name == 'workflow_dispatch' && steps.finalize.outputs.has_changes == 'true'
        shell: bash
        run: |
          git push --set-upstream origin "${{ env.BRANCH_NAME }}"

      - name: Create or update PR
        if: github.event_name == 'workflow_dispatch' && steps.finalize.outputs.has_changes == 'true' && inputs.create_pr
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          cat > pr_body.md <<EOF
          ## Automated Upstream Sync

          This PR syncs changes from the upstream NVIDIA/cutlass repository into this Intel SYCL fork.

          ### Upstream Details
          - Repository: NVIDIA/cutlass
          - Branch: ${{ env.SYNC_UPSTREAM_BRANCH }}
          - Commit: [${{ env.UPSTREAM_SHORT }}](https://github.com/NVIDIA/cutlass/commit/${{ env.UPSTREAM_COMMIT }})

          ### Sync Strategy
          - Merge upstream changes conservatively into this fork
          - Preserve Intel, Xe, SYCL, PVC, BMG, oneAPI, and Level Zero related changes
          - Preserve Intel-specific CI and workflow behavior
          - Drop incompatible NVIDIA-only or CUDA-only files and changes where appropriate

          ### Automation
          This branch was prepared by the upstream sync workflow using Claude Code for merge resolution and sync curation.
          EOF

          PR_URL=$(gh pr list \
            --base "${{ env.SYNC_BASE_BRANCH }}" \
            --head "${{ env.BRANCH_NAME }}" \
            --json url \
            --jq '.[0].url')

          if [ -z "${PR_URL}" ]; then
            gh pr create \
              --title "sync: NVIDIA/cutlass ${{ env.UPSTREAM_SHORT }}" \
              --body-file pr_body.md \
              --base "${{ env.SYNC_BASE_BRANCH }}" \
              --head "${{ env.BRANCH_NAME }}"
          else
            gh pr edit "${PR_URL}" --title "sync: NVIDIA/cutlass ${{ env.UPSTREAM_SHORT }}" --body-file pr_body.md
          fi

      - name: Workflow summary
        if: always()
        shell: bash
        run: |
          echo "## Upstream Sync Summary" >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          echo "- Provider: ${SYNC_PROVIDER}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Base branch: ${SYNC_BASE_BRANCH}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Upstream branch: ${SYNC_UPSTREAM_BRANCH}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Upstream commit: [${{ env.UPSTREAM_SHORT }}](https://github.com/NVIDIA/cutlass/commit/${{ env.UPSTREAM_COMMIT }})" >> "$GITHUB_STEP_SUMMARY"
          echo "- Sync branch: ${{ env.BRANCH_NAME }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Merge state at start: ${{ env.MERGE_STATE }}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "- Mode: PR test run only, no branch push or PR creation" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${{ steps.finalize.outputs.has_changes }}" = "true" ]; then
            echo "- Result: sync branch pushed" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Result: no changes to push" >> "$GITHUB_STEP_SUMMARY"
          fi
