name: install-intel-graphics
description: Download and unpack Intel graphics drivers
inputs:
  GPU:
    description: "Install for PVC or BMG gpu"
    type: string
  IGC:
    description: "Use ROLLING, STAGING, or LTS release"
    type: string

runs:
  using: "composite"
  steps:
    - name: Diagnostics
      shell: bash
      run: |
        echo "=== ACTION DIAGNOSTICS ==="
        echo "GPU input: '${{ inputs.GPU }}'"
        echo "IGC input: '${{ inputs.IGC }}'"
        echo "GPU length: ${#GPU_VAR}"
        echo "IGC length: ${#IGC_VAR}"
        echo "=== END DIAGNOSTICS ==="
      env:
        GPU_VAR: ${{ inputs.GPU }}
        IGC_VAR: ${{ inputs.IGC }}

    - name: Install Intel graphics drivers
      if: inputs.IGC == 'ROLLING'
      shell: bash
      run: |
        set -x
        shopt -s expand_aliases
        which sudo || alias sudo=""
        echo "GPU: ${{ inputs.GPU }}, IGC: ${{ inputs.IGC }}"
        if [[ "${{ inputs.GPU }}" == "BMG" ]] || [[ "${{ inputs.GPU }}" == "PVC" ]]; then
          echo "Installing Intel graphics drivers for ${{ inputs.GPU }}..."
          #purge existing intel graphics packages
          dpkg -l | grep -E 'libigc|libigsc0|intel-igc|libigdgmm|libigdfcl|libze-intel-gpu|libze1|libze-dev|intel-opencl-icd|intel-metrics-discovery|intel-gsc|intel-ocloc' | awk '{print $2}' | xargs -r sudo apt-get purge -y || true
          sudo rm -f /etc/apt/sources.list.d/kobuk-team-ubuntu-intel-graphics-*

          sudo add-apt-repository ppa:kobuk-team/intel-graphics
          sudo apt update
          sudo apt-get install --reinstall -y libze-intel-gpu1 libze-dev intel-metrics-discovery \
            intel-opencl-icd ocl-icd-opencl-dev clinfo intel-gsc intel-ocloc g++
          dpkg -l | grep libhwloc15 > /dev/null || sudo apt install -y libhwloc15
          echo "Completed: Intel graphics drivers installed for ROLLING"
        else
          echo "ERROR: GPU type ${{ inputs.GPU }} not supported (must be BMG or PVC)"
          exit 1
        fi
    - name: Install Intel graphics drivers
      if: inputs.IGC == 'STAGING'
      shell: bash
      run: |
        set -x
        shopt -s expand_aliases
        which sudo || alias sudo=""
        echo "GPU: ${{ inputs.GPU }}, IGC: ${{ inputs.IGC }}"
        if [[ "${{ inputs.GPU }}" == "BMG" ]] || [[ "${{ inputs.GPU }}" == "PVC" ]]; then
          echo "Installing Intel graphics drivers for ${{ inputs.GPU }}..."
          #purge existing intel graphics packages
          dpkg -l | grep -E 'libigc|libigsc0|intel-igc|libigdgmm|libigdfcl|libze-intel-gpu|libze1|libze-dev|intel-opencl-icd|intel-metrics-discovery|intel-gsc|intel-ocloc' | awk '{print $2}' | xargs -r sudo apt-get purge -y || true
          sudo rm -f /etc/apt/sources.list.d/kobuk-team-ubuntu-intel-graphics-*

          sudo add-apt-repository ppa:kobuk-team/intel-graphics-staging
          sudo apt update
          sudo apt-get install --reinstall -y libze-intel-gpu1 libze-dev intel-metrics-discovery \
            intel-opencl-icd ocl-icd-opencl-dev clinfo intel-gsc intel-ocloc g++
          dpkg -l | grep libhwloc15 > /dev/null || sudo apt install -y libhwloc15
          echo "Completed: Intel graphics drivers installed for STAGING"
        else
          echo "ERROR: GPU type ${{ inputs.GPU }} not supported (must be BMG or PVC)"
          exit 1
        fi
    - name: Install Intel graphics drivers
      if: inputs.IGC == 'LTS'
      shell: bash
      run: |
        set -x
        export no_proxy="127.0.0.1,localhost,apt.repos.intel.com,mlpc.intel.com,*.intel.com"
        shopt -s expand_aliases
        which sudo || alias sudo=""
        echo "GPU: ${{ inputs.GPU }}, IGC: ${{ inputs.IGC }}"
        if [[ "${{ inputs.GPU }}" == "PVC" ]]; then
          echo "Installing Intel graphics drivers for PVC (LTS)..."
          # Purge existing intel graphics packages
          dpkg -l | grep -E 'libigc|libigsc0|intel-igc|libigdgmm|libigdfcl|libze-intel-gpu|libze1|libze-dev|intel-opencl-icd|intel-metrics-discovery|intel-gsc|intel-ocloc' | awk '{print $2}' | xargs -r sudo apt-get purge -y || true
          sudo rm -f /etc/apt/sources.list.d/kobuk-team-ubuntu-intel-graphics-*
          sudo rm -f /etc/apt/sources.list.d/intel-gpu-*.list
          
          # Install LTS drivers for PVC
          . /etc/os-release
          if [[ ! " jammy noble " =~ " ${VERSION_CODENAME} " ]]; then
            echo "Ubuntu version ${VERSION_CODENAME} not supported"
            exit 1
          fi
          wget -qO - https://repositories.intel.com/gpu/intel-graphics.key | \
            sudo gpg --yes --dearmor --output /usr/share/keyrings/intel-graphics.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/intel-graphics.gpg] https://repositories.intel.com/gpu/ubuntu ${VERSION_CODENAME}/lts/2523 unified" | \
            sudo tee /etc/apt/sources.list.d/intel-gpu-${VERSION_CODENAME}.list
          sudo apt update
          sudo apt-get install --reinstall -y libze-intel-gpu1 libze-dev intel-metrics-discovery \
            intel-opencl-icd ocl-icd-opencl-dev clinfo intel-gsc intel-ocloc g++
          dpkg -l | grep libhwloc15 > /dev/null || sudo apt install -y libhwloc15

          echo "Installing latest IGC from ROLLING repo..."
          sudo rm -f /etc/apt/sources.list.d/intel-gpu-*.list
          sudo -E add-apt-repository ppa:kobuk-team/intel-graphics
          sudo apt update
          sudo apt install --reinstall -y libigc2
          echo "Completed: Intel graphics drivers installed for LTS"
        else
          echo "ERROR: LTS mode only supports PVC GPU (got ${{ inputs.GPU }})"
          exit 1
        fi
    
    - name: Fallback - No matching IGC mode
      if: success()
      shell: bash
      run: |
        echo "WARNING: No matching IGC mode found!"
        echo "GPU: '${{ inputs.GPU }}'"
        echo "IGC: '${{ inputs.IGC }}'"
        echo "Expected IGC values: ROLLING, STAGING, or LTS"
